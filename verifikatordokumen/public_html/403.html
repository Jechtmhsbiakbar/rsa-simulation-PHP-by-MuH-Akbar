<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Akses Ditolak</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f6f9;
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            padding: 35px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid #e5e7eb;
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: #fee2e2;
            color: #dc2626;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: bold;
        }

        h1 {
            font-size: 28px;
            color: #111827;
            margin-bottom: 10px;
        }

        p {
            color: #6b7280;
            line-height: 1.6;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .info {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            color: #374151;
        }

        .code {
            margin-top: 8px;
            font-weight: bold;
            color: #dc2626;
            word-break: break-word;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="icon">
            !
        </div>

        <h1>403 - Akses Ditolak</h1>

        <p>
            File keamanan RSA tidak dapat diakses secara publik.
            Private key digunakan untuk proses digital signature
            dan dilindungi oleh sistem keamanan server.
        </p>

        <div class="info">
            Status:
            <div class="code">
                Access Forbidden
            </div>
        </div>

    </div>

</body>

</html>
